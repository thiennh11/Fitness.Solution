<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <link rel="stylesheet"
          href="../css/profile.css">

</head>

<body>

    <!-- SIDEBAR -->

    <div id="sidebar" class="sidebar"></div>

    <!-- MAIN -->

    <div class="main-content">

        <div class="profile-card">

            <div class="profile-header">

                <span class="material-icons avatar">
                    account_circle
                </span>

                <h1 id="fullName">
                    Loading...
                </h1>

                <p id="email">
                    Loading...
                </p>

            </div>

            <div class="profile-info">

                <div class="info-box">

                    <h3>Weight</h3>

                    <p id="weight">
                        Loading...
                    </p>

                </div>

                <div class="info-box">

                    <h3>Height</h3>

                    <p id="height">
                        Loading...
                    </p>

                </div>

                <div class="info-box">

                    <h3>Age</h3>

                    <p id="age">
                        Loading...
                    </p>

                </div>

                <div class="info-box">

                    <h3>BMI</h3>

                    <p id="bmi">
                        Loading...
                    </p>

                </div>

                <div class="info-box">
                    <h3>Status</h3>
                    <p id="bmiStatus">Loading...</p>
                </div>

            </div>

            <div class="edit-btn-wrapper">

                <button class="btn-edit"
                        onclick="openEditModal()">

                    <span class="material-icons">
                        edit
                    </span>

                    Edit Profile

                </button>

            </div>

        </div>

    </div>

    <!-- EDIT MODAL -->

    <div id="editModal"
         class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <h2>Edit Profile</h2>

                <span class="material-icons close-btn"
                      onclick="closeEditModal()">

                    close

                </span>

            </div>
            <label>Full Name</label>

            <input type="text"
                   id="editFullName">

            <div id="weightField">

                <label>
                    Weight (kg)
                </label>

                <input type="number"
                       id="editWeight"
                       min="1"
                       step="0.1">

            </div>

            <div id="heightField">

                <label>
                    Height (cm)
                </label>

                <input type="number"
                       id="editHeight"
                       min="1"
                       step="0.1">

            </div>

            <div id="ageField">

                <label>
                    Age
                </label>

                <input type="number"
                       id="editAge"
                       min="1">

            </div>

            <div class="modal-actions">

                <button class="btn-cancel"
                        onclick="closeEditModal()">

                    Cancel

                </button>

                <button class="btn-save"
                        onclick="updateProfile()">

                    Save

                </button>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="../js/common.js"></script>
    <script src="../js/profile.js"></script>

</body>

</html>
