<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workouts</title>
    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- ICON -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/workouts.css">
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar"></div>

    <!-- MAIN -->
    <div class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">
            <h1>Workout Plans</h1>
            <button onclick="openModal()">Add Workout</button>
        </div>

        <!-- TABLE -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Exercise</th>
                        <th>Duration</th>
                        <th>Calories Burned</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="workoutTableBody">
                </tbody>
            </table>
        </div>

    </div>

    <!-- ADD MODAL -->

    <div id="workoutModal"
         class="modal">

        <div class="modal-content">

            <!-- HEADER -->

            <div class="modal-header">

                <h2>Add Workout</h2>

                <span class="material-icons close-btn"
                      onclick="closeModal()">

                    close

                </span>

            </div>

            <!-- DATE -->

            <input type="date"
                   id="workoutDate"
                   required>

            <!-- WORKOUT ITEMS -->

            <div id="workoutItemsContainer">

                <!-- FIRST ITEM -->

                <div class="workout-item">

                    <select class="exerciseSelect">
                    </select>

                    <input type="number"
                           class="durationInput"
                           placeholder="Duration (minutes)"
                           min="1">

                </div>

            </div>

            <!-- ADD ITEM BUTTON -->

            <button type="button"
                    class="add-exercise-btn"
                    onclick="addWorkoutItemField()">

                + Add Exercise

            </button>

            <!-- ACTIONS -->

            <div class="modal-actions">

                <button class="btn-cancel"
                        onclick="closeModal()">

                    Cancel

                </button>

                <button class="btn-save"
                        onclick="addWorkout()">

                    Save

                </button>

            </div>

        </div>

    </div>

    <!-- DELETE MODAL -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Delete Workout</h2>
                <span class="material-icons close-btn" onclick="closeDeleteModal()">close</span>
            </div>
            <p>Are you sure you want to delete this workout?</p>
            <input type="hidden" id="deleteWorkoutId">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-delete" onclick="confirmDeleteWorkout()">Delete</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="../js/common.js"></script>
    <script src="../js/workouts.js"></script>

</body>
</html>
