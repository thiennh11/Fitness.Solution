<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fitness Login</title>
    <link rel="icon"
          type="image/svg+xml"
          href="data:image/svg+xml,
      %3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E
      %3Ctext y='20' font-size='20'%3E🏋️%3C/text%3E
      %3C/svg%3E">

    <!-- FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- ICON -->

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- BACKGROUND -->

    <div class="blob-top"></div>

    <div class="blob-bottom"></div>

    <!-- LOGIN -->

    <div class="login-card">

        <div class="logo">

            <span class="material-icons">
                fitness_center
            </span>

            <h1>Fitness App</h1>

            <p>Login to continue</p>

        </div>

        <!-- EMAIL -->

        <div class="input-group">

            <span class="material-icons input-icon">
                person
            </span>

            <input type="email"
                   id="email"
                   required>

            <label>Email</label>

        </div>

        <!-- PASSWORD -->

        <div class="input-group">

            <span class="material-icons input-icon">
                lock
            </span>

            <input type="password"
                   id="password"
                   required>

            <label>Password</label>

            <span class="material-icons toggle-password"
                  onclick="togglePassword()">

                visibility

            </span>

        </div>

        <!-- BUTTON -->

        <button class="login-btn"
                onclick="login()">

            LOGIN

        </button>
        <div id="message"></div>

        <!-- OR -->

        <div class="or-line">

            <span>or</span>

        </div>

        <!-- REGISTER -->

        <div class="register">

            <p>
                Don't have an account?

                <a href="pages/register.html">
                    Register
                </a>
            </p>

        </div>
        <!-- button Google -->
        <button class="google-btn" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4" />
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853" />
                <path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05" />
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335" />
            </svg>
            Đăng nhập bằng Google
        </button>

        <style>
            .google-btn {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 12px;
                border: 1.5px solid #dadce0;
                border-radius: 8px;
                background: white;
                color: #3c4043;
                font-family: 'Poppins', sans-serif;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s, box-shadow 0.2s;
                margin-top: 8px;
            }

                .google-btn:hover {
                    background: #f8f9fa;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                }
        </style>

        <script>
            function loginWithGoogle() {
                window.location.href = "https://localhost:7180/api/Auth/google-login";
            }
        </script>

    </div>
    <script src="js/login.js"></script>
</body>

</html>
